<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Graduation Cap (Mortarboard) -->
  <!-- Cap Stand / Skull cap -->
  <path d="M 38,44 L 38,51 C 38,53 42,54 44,54" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round" />
  <path d="M 38,44 L 58,49 L 58,57 C 52,57 48,55 42,53 Z" fill="#0f172a" stroke="#0f172a" stroke-width="2.5" />
  <!-- Cap Diamond Plate -->
  <polygon points="58,26 24,37 58,48 92,37" fill="#0f172a" stroke="#0f172a" stroke-width="3.5" stroke-linejoin="round" />
  
  <!-- Open Book Cover (Shadow Layer) -->
  <path d="M 16,80 C 24,88 38,92 54,92 C 70,92 84,88 92,80 L 92,58 C 84,66 70,70 54,70 C 38,70 24,66 16,58 Z" fill="#0f172a" stroke="#0f172a" stroke-width="3.5" stroke-linejoin="round" />
  
  <!-- Open Book Pages (White Pages) -->
  <!-- Left Page -->
  <path d="M 18,77 C 26,84 39,87 52,87 L 52,63 C 39,63 26,60 18,53 Z" fill="#ffffff" stroke="#0f172a" stroke-width="3.5" stroke-linejoin="round" />
  <!-- Right Page -->
  <path d="M 56,87 C 69,87 82,84 90,77 L 90,53 C 82,60 69,63 56,63 Z" fill="#ffffff" stroke="#0f172a" stroke-width="3.5" stroke-linejoin="round" />
  
  <!-- Book Spine Center line -->
  <line x1="54" y1="63" x2="54" y2="92" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round" />

  <!-- Page Lines (Text representation) -->
  <!-- Left Page Lines -->
  <line x1="26" y1="63" x2="44" y2="67" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />
  <line x1="26" y1="70" x2="44" y2="74" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />
  <line x1="26" y1="77" x2="38" y2="80" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />

  <!-- Right Page Lines -->
  <line x1="64" y1="67" x2="82" y2="63" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />
  <line x1="64" y1="74" x2="82" y2="70" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />
  <line x1="70" y1="80" x2="82" y2="77" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />

  <!-- Paper Airplane -->
  <!-- Shadow/Underlayer of the plane -->
  <polygon points="94,14 26,52 66,58" fill="#0f172a" stroke="#0f172a" stroke-width="5" stroke-linejoin="round" />
  <!-- Left Wing (White) -->
  <polygon points="94,14 26,52 46,55" fill="#ffffff" stroke="#0f172a" stroke-width="3.5" stroke-linejoin="round" />
  <!-- Right Wing Fold (Light Grey) -->
  <polygon points="94,14 46,55 66,58" fill="#cbd5e1" stroke="#0f172a" stroke-width="3.5" stroke-linejoin="round" />
</svg>
